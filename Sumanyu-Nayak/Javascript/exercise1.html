<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>
    <fieldset>
        <legend>Contact Form</legend>
        <form>
            <label for="name">Name:</label>
            <input type="text" name="name"  placeholder="Enter your name">
            <br>
            <label for="email">Email:</label>
            <input type="email" name="email" placeholder="Enter your email">
            <br>
            <label for="phone">Phone:</label>
            <input type="tel" name="phone" placeholder="Enter your phone number" pattern="[0-9]{10}">
            <br>
            <select name="category">
                <option value="Inquiry">Inquiry</option>
                <option value="Feedback">Feedback</option>  
                <option value="Complaint">Complaint</option>
            </select>
            <br>
            <textarea name="message" rows="5" cols="30" placeholder="Message Text Area..." maxlength="500"></textarea>
            <br>
            <button type="submit" onclick="alert('Form submitted!')">Submit Form</button>
            <button type="reset">Reset Form</button>
        </form>
    </fieldset>
</body>
</html>
