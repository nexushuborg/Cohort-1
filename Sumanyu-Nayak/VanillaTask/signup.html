<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="card">
            <h3 class="heading" >VanillaTask</h3>
            
            <form id="signupForm">
                <h2 class="title">Create Your Account</h2>
                <p class="subtitle">Free forever-no credit card required</p>
                <div class="form-group">
                    <label for="username">Username</label>
                    
                    <input type="text" id="username" name="username" required placeholder="Alex">
                    

                    <label for="email">Email</label>
                    
                    <input type="email" id="email" name="email" required placeholder="alex@example.com">
                    

                    <label for="password">Password</label>
                    
                    <input type="password" id="password" name="password" required placeholder="Atleast 6 characters">
                    

                    <label for="confirmPassword">Confirm Password</label>
                    
                    
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repeat your password">
                    
                    <button class="btn" type="submit">Create Account</button>
                </div>
            </form>
            <div class="bottom-text">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>

    </div>
</body>
<script src="signup.js"></script>
</html>
