<!DOCTYPE html><!--declaration for the webpage to expect a html page and render it continuously-->
<html lang="en"><!-- root element that contains the entire html body-->
<head><!--contains meta data that is not directly shown on webpage like title links etc. it is used by browser and search engines-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> My First Webpage</title><!--defines the title bar content-->

</head>
<body><!--contains all the visible contents of the web page that the user sees in the main web browser window-->
    <h1>My Page</h1><!--important headins has variation of sizes like h1,h2,h3-->
    <p> Hello and Welcome to my page! let's code!</p><!--write the actual contents in the form of paragraphs-->
    <a href="https://www.google.com/">visit google</a>

    
</body>
<script src="script.js"></script>
</html><!--HTML attributes:provide additional information about an elemnet .ex href,src
written as name+"value" pairs
customises how element behaves or display in browser-->
