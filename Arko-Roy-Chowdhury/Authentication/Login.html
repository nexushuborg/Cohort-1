<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Form</title>
</head>
<script src="Script.js"></script> <!-- Link to external JavaScript file -->
<link rel="stylesheet" href="Style.css"> <!-- Link to external CSS file -->

<body>

<div class="auth-container"> <!-- Container for authentication forms -->
    <form id="signupForm"> <!-- Signup form starts -->
        <h2>Create Account</h2> <!-- Heading for signup -->
        
        <input type="text" id="regUsername" placeholder="Username" required><br><br> <!-- Username input field -->
        
        <input type="password" id="regPassword" placeholder="Password" required><br><br> <!-- Password input field -->
        
        <button type="submit" class="button">Sign Up</button> <!-- Signup button -->
        
        <p>Already have an account? 
            <span class="form span" onclick="toggleForm()">Login</span> <!-- Link to switch to login form --> 
        </p>
    </form> <!-- Signup form ends -->

    <form id="loginForm" class="hidden"> <!-- Login form starts (hidden by default) -->
        <h2>Welcome Back</h2> <!-- Heading for login -->
        <input type="text" id="loginUsername" placeholder="Username" required><br><br> <!-- Username input field -->
    
        <input type="password" id="loginPassword" placeholder="Password" required><br><br> <!-- Password input field -->
    
        <button type="submit" class="button">Login</button> <!-- Login button -->
    
        <p>New here?
            <span class="form span" onclick="toggleForm()">Sign up</span> <!-- Link to switch to signup form -->
        </p>
    </form> <!-- Login form ends -->
</div> <!-- End of authentication container -->

</body>
</html>
