<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="signupp.css">
<body>
    <div id="signup">
        <h1>Create your account</h1>
        <h5>Free forever--no credit card needed</h5>
        <form action="" id="signupform">
            <label for="name">Username</label>
            <input type="text" id="username" placeholder="e.g.Ishan" required>
            <div id="n-incorrect"></div>
            <label for="email">Email</label>
            <input type="email" id="useremail" placeholder="demo@exmaple.com" required>
            <div id="e-incorrect"></div>
            <label for="password">Password</label>
            <input type="password" id="userpassword" placeholder="Atleast 6 characters" required>
            <div id="p-incorrect"></div>
            <label for="password">Confirm Password</label>
            <div id="indicator"></div>
            <input type="password" id="confirmpassword" placeholder="Repeat your password" required>
            <button type="submit">Create Account</button>
            <p>Already have an account?<a href="index.html">Log in</a></p>
        </form>
    </div>
</body>
<script src="signup.js"></script>
</html>
