<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<link rel="stylesheet" href="style.css">
<body>
    <div id="login">
        <h1>Welcome Back</h1>
        <h4>Log in to access your board</h4>
        <form action="" id="loginform">
            <label for="email">Email</label>
            <br>
            <input type="email" id="useremail" placeholder="you@example.com" required>
            <br>
            <label for="password">Password</label>
            <br>
            <input type="password" id="userpassword" placeholder="Enter your password" required>
            <br>
            <button type="submit" id="login-btn">Log In</button>
            <p>Don't have an account?<span onclick="toggleForm()">Sign up free</span>
            </p>
        </form>
    </div>
    <script src="./login.js"></script>
</body>
</html>
