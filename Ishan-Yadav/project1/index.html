<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<link rel="stylesheet" href="style.css">
<body>
    <div class="container">
        <div id="login">
            <h1>Welcome Back</h1>
            <p>Log in to access your board</p>
            <form action="" id="loginform">
            <div id="incorrect">
            </div>
            <label for="email">Email</label>
            <input type="email" id="useremail" placeholder="you@example.com" required>
            <div class="password-row">
            <label for="password">Password</label>
            <a href="#">Forgot password?</a>
            </div>
            <input type="password" id="userpassword" placeholder="Enter your password" required>

            <button type="submit" id="login-btn">Log In</button>
            <p class="signup">Don't have an account?<a href="signup.html">Sign up free</a>
            </p>
        </form>
        </div>
    </div>

</body>
<script src="./login.js"></script>
</html>
