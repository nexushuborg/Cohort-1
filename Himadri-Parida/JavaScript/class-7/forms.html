<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <div class="auth-container"> <!-- Container for authentication forms -->

<form id="signupForm"> <!-- Signup form starts -->
<h2>Create Account</h2> <!-- Heading for signup -->

<input type="text" id="regUsername" placeholder="Username" required> <!-- Username input field -->
<input type="password" id="regPassword" placeholder="Username" required>
<button type = "submit">sign up</button>
<p>Already Have an Account
    <span onclick="toggleForm()">Login</span>
</p>
</form>
<form id="loginform" class ="hidden">
    <h2>Welcome Back</h2>
    <input type = "text" id="loginUsername" placeholder = "Username" required>
    <input type="password" id="loginPassword" placeholder="Password" required>
    <button type = "submit">Login</button>
    
    <p>New Here?
        <span onclick="toggleForm()">sign up</span>
    </p>
</form>
</div>
<script>
    const signupForm = document.getElementById('signupform');
    signupForm.addEventListener('submit',(e)=> {   //e is the event object -- here is the event is the sign up of the form
        e.preventDefault();
        const user = document.getElementById('regUsername').value;
         const pass = document.getElementById('regPassword').value;
    // Gets the password entered by the user

    const users = JSON.parse(localStorage.getItem('users')) || [];
    // Retrieve existing users from LocalStorage

    if (users.find(u => u.username === user)) {    
        alert("Username taken!");
        return;
        }

    users.push({ username: user, password: pass });
    // Add new user object to array

    localStorage.setItem('users', JSON.stringify(users)); // setItem is used to store
    // Save updated users array into LocalStorage

    alert("Signup Successful! Please Login.");
    toggleForm();
    // Switch from signup form to login form

    });
function toggleForm() {
    // Function to toggle between signup and login forms
    document.getElementById('signupForm').classList.toggle('hidden');
    document.getElementById('loginForm').classList.toggle('hidden');
}
</script>
</body>
</html>
