<html>
<body>
<form id="userForm">
    <input type="text" id="username" placeholder="Enter Name">
    <br><br>
    <small id="nameError" style="color:red; display:none;">
         Name is required!
    </small>
    <input type="email" id="user email" placeholder="Enter Email">
    <br><br>
    <textarea type="message" id="user-message" placeholder="Enter your message"></textarea>
    <button type="submit">Submit message</button>
</form>

<script>
    const form=document.getElementById('userForm');
    const displayArea=document.getElementById('displayArea');

    form.addEventListener('submit',function(event) {
        event.preventDefault();
        const name=document.getElementById('username').value;
        const email=document.getElementById('userEmail').value;
        const message=document.getElementById('message').value;
        const nameError=document.getElementById('nameError');
    
        if(name.trim()==""){
            nameError.style.display="block";
            return;
        }
        else{
            nameError.style.display="none";
        }

        displayArea.innerHTML=
        <div class="card">
        <h3>Message Submitted Successful!</h3> 
        <p><strong>Name:</strong>${name}</p>
        <p><strong>Email:</strong>${email}</p>  
        <p><strong>Message:</strong>${message}</p> 
        </div>;
       
        form.reset();
    
    });

</script>
</body>
</html>
