<!DOCTYPE html>
<html>
<head>
<title>Drag and Drop Masterclass</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Container 1 -->
<div class="container" id="left-zone">
<h2>To Do</h2>
<div class="item" id="task-1" draggable="true">Learn HTML</div>
<div class="item" id="task-2" draggable="true">Master CSS</div>
</div>
<!-- Container 2 -->
<!--draggable="true" attribute makes the item draggable -->
<div class="container" id="right-zone">
<h2>Done</h2>
<!-- Items can be dropped here -->
<div class="item" id="task-3" draggable="true">Install Browser</div>
</div>
<script src="script.js"></script>
</body>
</html>

drop: for when an item is dropped into a drop zone
