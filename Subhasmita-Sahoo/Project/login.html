<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
</head>
<body>
    <div class="auth-container">

    <div class="logo">✦ VanillaTask</div>
    
     <!--LOGIN-->
    <form id="loginForm" class="hidden">
        <h2>Welcome Back</h2>
        <p class = "p2">Log in to access your board</p>
    
         <p class = "p1">Email</p>
        <div class="input-group">
            <input type="email" id="loginUsername" placeholder="you@example.com" required>
        </div>

        <p class="p1">Password</p>
        <div class="input-group">
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>

        <button type="submit">Log In</button>
        <p>Don't have an account?
          <span onclick="toggleForm()">Sign Up free</span>
        </p>
    </form>
</div> 



</body>
</html>
