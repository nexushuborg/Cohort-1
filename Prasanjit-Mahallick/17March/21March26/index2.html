<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container" >
    <div class="card">
        <h2>Welcome Back</h2>
        <hp>Log in to access your board</p>
        
        <form>

            <label>Email:</label><br>
            <input type="email" id="email" placeholder="email" required>
            <br>
            <div class="passRow">

                <label>Password</label>

                <a href="#" class="forgot">
                    Forgot password?
                </a>
            </div>
            <div class="passBox">

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                >
                <span onclick="togglePass()">
                </span>

            </div>

            <button
                type="button"
                onclick="login()"
            >
                Log In
            </button>
        </form>
        <p class="bottom">
            Don't have an account?
            <a href="index.html">
                Sign up free
            </a>
        </p>
        <script src="login.js"></script>
            
        </p>
    </div>
    </div>
</body>
</html>
