<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login">
        <div id="companyHeading">
            <h1>✦ VanillaTask</h1>
        </div>
        <div id="welcome">
            <h1>Welcome back</h1>
            <p>Log in to access your board</p>
        </div>
        <form id="registrationForm">
            <div class="inputs">
                <div class="labels">Email</div>
                <br>
                <input type="email" id="email" name="email" placeholder="you@example.com">
            </div>
            <br>
            <div class="inputs">
                <div class="labels">Password <span>Forgot password?</span> </div>
                <br>
                <input type="password" id="password" name="password" placeholder="Enter your password">
            </div>
            <br>
            <button type="submit" class="btn">Log In</button>
         </form>
         <p class="account">Don't have a an account? 
            <a class="signup" href="./SignUp.html">Sign up free</a>
        </p>
    </div>
    
</body>
<script src="./script.js"></script>
</html>
