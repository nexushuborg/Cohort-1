<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="SignUp">
        <div id="companyHeading">
            <h1>✦ VanillaTask</h1>
        </div>
        <div id="welcome">
            <h1>Create your account</h1>
            <p>Free forever—no credit needed</p>
        </div>
        <form id="registrationForm">
            <div class="inputs">
                <div class="labels">Username</div>
                <br>
                <input type="text" id="username" name="username" placeholder="e.g. Alex">
            </div>
            <div class="inputs">
                <div class="labels">Email</div>
                <br>
                <input type="email" id="email" name="email" placeholder="you@example.com">
            </div>
            <br>
            <div class="inputs">
                <div class="labels">Password</div>
                <br>
                <input type="password" id="password" name="password" placeholder="At Least 6 Character">
            </div>
            <div id="pwdchecker">
                
            </div>
            <div class="inputs">
                <div class="labels">Confirm Password</div>
                <br>
                <input type="password" id="confirmPwd" name="confirmPwd" placeholder="Repeat your password">
            </div>
            <br>
            <button type="submit" class="btn">Create Account</button>
         </form>
         <p class="account">Already have a an account? 
            <a class="signup" href="./login .html">log in</a>
        </p>
    </div>
    
</body>
<script src="script.js"></script>
</html>
