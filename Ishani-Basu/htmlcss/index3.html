<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="div-container">
        <h1>Hello</h1>
        <p>World</p>
        <button id="btn">Click Me</button>
    </div>
    <h1 class="num" id="1">Hello1</h1>
    <h1 class="num" id="2">Hello2</h1>
    <h1 class="num" id="3">Hello3</h1>
    <h1 class="num">Four</h1>
    <button id="but" onclick="change">Click Me</button><br><br>

    <form id="registration-form">
        <label for="name">Name: </label>
        <input type="text" name="name" required size="20" placeholder="Enter your name" id="username"><br><br>
        <label for="email">Email Address: </label>
        <input type="email" name="email" required placeholder="Enter your E-MAIL address" id="email"><br><br>
        <label for="password">Password: </label>
        <input type="password" name="password" placeholder="Enter password" id="password"><br><br>
        <button type="submit">Register</button><br>
    </form>
    <p id="para"> Hello world </p>
</body>
<script src="./script.js"></script>
</html>
