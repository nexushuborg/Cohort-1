    <table border="2px" cellpadding="10px">
        <form>
        <tr>
        <td><label for="name">Name: </label></td>
        <td><input 
        type="text"
        name="name"
        required
        minlength="5"
        maxlength="15"
        size="20"
        placeholder="Enter your name"
        >
        </td>
        </tr>
        <tr>
        <td><label for="email">Email Address: </label></td>
        <td><input type="email"
        name="email"
        required
        placeholder="Enter your E-MAIL address"
        ></td>
        </tr>
        <tr>
        <td><label for="password">Password: </label></td>
        <td><input type="password" name="password" placeholder="Enter password"></td>
        <tr>
        <td><label for="phone">Phone Number: </label></td>
        <td><input type="number" required name="phone" placeholder="Enter phone number"></td>
        </tr>
        <tr>
        <td><label for="gender">Gender: </label></td>
        <td><input type="radio" required name="gender">
        <span>Male</span>
        <input type="radio" required name="gender">
        <span>Female</span>
        <input type="radio" required name="gender">
        <span>Others</span></td>
        </tr>
        <tr>
        <td><label for="date">Date: </label></td>
        <td><input type="date" name="date"></td>
        </tr>
        <td colspan="2"><input type="submit" name="submit" style="margin: 0 0 0 130px;"></td>
        </form>
    </table>
