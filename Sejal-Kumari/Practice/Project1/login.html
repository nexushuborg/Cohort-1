<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Task</title>
    <link rel="stylesheet" href="./style1.css">
</head>
<body>
    <form id="LogIn">
        <div>
            <div id="main-heading">
                <h1 class="heading">Welcome Back</h1>
                <p class="para">Log in to access your board</p>
            </div>
            <label for="email" id="email">Email</label><br>
            <input type="email" name="email" id="email" placeholder="you@example.com" required>
            <br>
            <label for="password" id="pass">Password</label><br>
            <input type="password" name="password" id="password" placeholder="At least 6 characters" required>
            <br>
            <div>
            <button type="submit">Log In</button>
            </div>
            <p class="para">Don't have an account? <a href="./register.html">Sign up free</a></p>
            </div>
    </form>
    <script src="./script1.js"></script>
</body>
</html>
