<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Task</title>
    <link rel="stylesheet" href="./style1.css">
</head>
<body>
    <form id="Register">
        <div id="Registering">
           <div id="main-heading">
             <h1 class="heading">Create your account</h1>
            <p class="para">Free forever - no credit card needed</p>
           </div>
            <label for="username" id="username">username</label><br>
            <input type="text" name="username" id="username" placeholder="e.g Alex" required>
            <br>
            <label for="email" id="email">Email</label><br>
            <input type="email" name="email" id="email" placeholder="you@example.com" required>
            <br>
            <label for="password" id="pass">Password</label><br>
            <input type="password" name="password" id="password" placeholder="At least 6 characters" required>
            <br>
            <div class="strength-container">
                <div id="strength-bar"></div>
            </div>
            <p id="strength-text"></p>
            <label for="confirm_password" id="conf_pass">Confirm Password</label><br>
            <input type="password" name="confirm_password" id="confirm_password" placeholder="Repeat your password" required><br>
            <br>
        </div>
        <div>
            <button type="submit">Create Account</button>
        </div>
        <p class="para">Already have an account? <a href="./login.html">Log in</a></p>
    </form>

    
    <script src="./script1.js"></script>
</body>
</html>
