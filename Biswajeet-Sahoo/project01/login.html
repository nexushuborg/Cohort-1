<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <div class="box">
      <div class="top">
        <h1 id="welcome">Welcome back</h1>
        <h3 id="msg">Log in to access your board</h3>
      </div>
      <div class="input">
        <input type="email" placeholder="Email" required>
      </div>
      <br>
      <div class="input">
        <input type="password" placeholder="Password" required>
      </div>
      <div class="end">
        <div id="login">
          <button id="loginbutton">Log in</button>
        </div>
        <div id="last">
          <p>Don't have a account ? <span><button id="signup">Sign up for free</button></span></p>
        </div>
      </div>
    </div>
  </div>
</body>
  <script src="javascript.js"></script>
</html>
