<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List</title>
</head>
<body>
  <div class="input">
    <input type="text" id="text-input" placeholder="Enter task..."/>
    <button id="addBtn">Add Task</button>
  </div>
  
  <div class="board">
    <div class="container" id="todo">
      <h3>Task</h3>
    </div>
    <div class="container" id="ongoing">
      <h3>Ongoing</h3>
    </div>
    <div class="container" id="done">
      <h3>Done</h3>
    </div>
  </div>
  <script src="script2.js"></script>
</body>
</html>
