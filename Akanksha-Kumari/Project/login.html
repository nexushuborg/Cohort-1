<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: Arial;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #020617, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      width: 350px;
      padding: 30px;
      border-radius: 15px;
      background: #0f172a;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }

    .logo {
      color: #60a5fa;
      margin-bottom: 10px;
      font-weight: bold;
    }

    h2 {
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      font-size: 12px;
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #64748b;
    }

    .password-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .forgot {
      font-size: 12px;
      color: #60a5fa;
      cursor: pointer;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .signup {
      text-align: center;
      font-size: 12px;
      margin-top: 15px;
      color: #94a3b8;
    }

    .signup a {
      color: #60a5fa;
      text-decoration: none;
    }

    .signup a:hover {
      text-decoration: underline;
    }

    .error {
      background: #7f1d1d;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">✨ VanillaTask</div>

    <h2>Welcome back</h2>
    <div class="subtitle">Log in to access your board</div>

    <div class="error" id="errorBox">
      Invalid email or password.
    </div>

    <form id="loginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="input-group">
        <div class="password-row">
          <label>Password</label>
          <span class="forgot">Forgot password?</span>
        </div>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <button class="btn" type="submit">Log In</button>
    </form>

    <div class="signup">
      Don’t have an account? <a href="signUp.html">Sign up free</a>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");

    // Dummy credentials (you can change)
    const validEmail = "admin@example.com";
    const validPassword = "123456";

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (email === validEmail && password === validPassword) {
        errorBox.style.display = "none";
        
        // Redirect (change this URL)
        alert("Login successful!");
        window.location.href = "dashboard.html";
      } else {
        errorBox.style.display = "block";
      }
    });
  </script>

</body>
</html>
