<!DOCTYPE html>  <!--declaration for the webpage to expect a html page and render it continuously-->
<html lang="en">   <!--root element that contains the entire html body-->
<head>    <!--containd metadata that is not directly shown in webpage like title links etc. it is used by browser and search-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My first web page</title>  <!--defines the title bar content-->
</head>
<body>  <!--contains all the visible contents of the webpage that the user sees in the main web browser window-->
    <h2>My Page</h2>  <!--important headings, has variations of size in h1,h2,h3..-->
    <p>Hello and welcome to my page ! Let's code!</p>   <!--write the actual content in form of paragraph-->
    <a href="https://www.example.com/">Visit example</a>
<!--Html attributes: provide additional information about an element,eg href,src
written as name="value" pairs
customizes how element behaves or dispaly in browser-->
<!--<a></a> this is called the anchor tag ,creates hyperlinks,can link texts, images and buttons-->
<!--contains the text that is aimed to be converted as link
href attributes adds a link to the plain html text,makes it another link to webpage-->
    <p>Click on the following link</p>
    <a href="https://www.geekforgeeks.org/" target="_blank" >GeeksForGeeks</a>   
<!--this target blank is used to open the link in new page
similarly,target="_self is used to open the link in the same window or page"-->
<!--<img> tag is used to embed an image in the web page.It is defined by attributes like src,width,height and alt and doesn't require a closing tag
src attribute contain the source of the image path link or local file path
alt attribute acts as a placeholder name in case the image doesn't load
height and width define the dimensions of the image
to add image as links we enclose the img tag  -->
   <br>
   <img src="https://www.bing.com/images/search?view=detailV2&ccid=CIac5BAb&id=610AB4B1BACB9FCCD4D75D6E6E895E7219CDBA62&thid=OIP.CIac5BAbYhrvBddLTcoNxAHaEW&mediaurl=https%3a%2f%2fimages.pexels.com%2fphotos%2f63764%2fpexels-photo-63764.jpeg%3fcs%3dsrgb%26dl%3dcar-cars-lamborghini-aventador-63764.jpg%26fm%3djpg&exph=4190&expw=7139&q=car+iamges&mode=overlay&FORM=IQFRBA&ck=440D3B9395B8C88FB5A4E64BF2394B2F&selectedIndex=0&idpp=serp">
</body>
</html>
