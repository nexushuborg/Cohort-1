<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="userForm">

        <small id="nameError" style="color: red; display: none;">
            Name is required !
        </small>

        <h3>Contact Form</h3>
       <label for=""> Name: <input type="text" id="username" name="name" placeholder="Enter your name" maxlength="50"></label><br>

        <label for=""> Email: <input type="text" id="userEmail" name="name" placeholder="Enter your email" ></label><br>

        <label for=""> Message: <input type="text" id="message" name="name" placeholder="Enter a message" maxlength="200" ></label><br>

        <button type="submit">Submit</button>




    </form>
    <br>

    <div id="displayArea"></div>
    <script>
            const form=document.getElementById('userForm');
            const displayarea=document.getElementById('displayArea');

            form.addEventListener('submit',function(event){

                event.preventDefault();

                const name=document.getElementById('username').value;

                const email=document.getElementById('userEmail').value;

                const message=document.getElementById('message').value;

                const nameError=document.getElementById('nameError');


                if(name.trim()===""){
                    nameError.style.display="block";
                    return;
                }
                else{
                    nameError.style.display="none";
                }


                displayArea.innerHTML=`

                <div class="card">
                
                <h3> Message Submited successfully</h3>

                <p><strong>Name:</strong>${name}</p>

                <p><strong>Email:</strong>${email}</p>

                <p><strong>Message:</strong>${message}</p>

                </div>

                `;

                form.reset();

            })



    </script>
    
</body>
</html>
