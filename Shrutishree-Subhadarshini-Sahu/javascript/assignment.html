<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            text-align:center;
            font-family:"Courier New";

        }
        table{
            margin:1px;
            border:2px solid black;
        }
        td, th{
            border:2px solid black;
            padding: 20px;
            text-align:"center";

        }
    </style>
</head>
<body>
<h2>HTML Table Colspan & Rowspan</h2>
    <table border="1">
    <tr>
        <td rowspan="2">Row 1,2,3</td>
        <td colspan="2">Column 1 & 2</td>
    </tr>
    <tr>
        <td>Item A</td>
        <td>Item B</td>
    </tr>
    </table>
</body>
</html>
