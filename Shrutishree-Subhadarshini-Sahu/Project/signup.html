<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style517.css">
</head>
<body>
    <form id="loginform" class="hidden">
        <h3>✦ Vanilla Task</h3>
        <h1>Create your account</h1>
        <h5>Free forever- no credit card needed</h4>
        <div id="signup" class="signup">
            <br>
            Username
            <br>
            <input type="text" id="username" placeholder="e.g. alex" required>
            Email
            <br>
            <input type="email" id="email" placeholder="Enter Email" required>
            <br>
            Password
            <br>
            <input type="password" id="password" placeholder="Enter password" required>
            <br>
            Confirm Password
            <br>
            <input type="password" id="password" placeholder="Repeat your password" required>
            <br>
            <button>Create Account</button>
            <p>Alredy have an account?
            <a href="login.html">Log in</a>
            </p>
        </div>
</form>
</body>
</html>
