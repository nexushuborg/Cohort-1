<body>
    <!-- FIELDSET -->
    <fieldset>

        <legend>Personal Details</legend>
    <label for="name">           <!--The name in for of label and the name="" should be same-->
      <p>Name: <input type="text" name="name" placeholder="Enter Your Name....."></p>
    </label>
    
    <label>
      <p>Email: <input type="email" placeholder="Enter Your Email....."></p>
    </label>
    
    <label>
      <p>Password: <input type="password" placeholder="Enter Your Password....."></p>
    </label>
    
    <form>
        <p>Gender:</p>
            <label for="male">
                <input type="radio" name="gender" id="male">
                male
            </label>
            <label>
                <input type="radio" name="gender" id="female">
                female
            </label>
    </form>

    </fieldset>
